<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Styled Table</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    thead {
      background: #000000;
      color: rgb(255, 255, 255);
    }

    th,
    td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    tbody tr:hover {
      background: #f1f7ff;
    }

    tbody tr:nth-child(even) {
      background: #fafafa;
    }

    th {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>SN</th>
          <th>Name</th>
          <th>DOB</th>
          <th>Number</th>
          <th> Active</th>

        </tr>
      </thead>

      <tbody>
        {% for i in student %}
        <tr>
          <td>{{forloop.counter}}</td>
          <td>{{i.name}}</td>
          <td>{{i.DOB}}</td>
          <td>{{i.number}}</td>
          <td>{{i.is_active}}</td>
        </tr>
        {% endfor %}

      </tbody>
    </table>
  </div>

</body>
</html>
